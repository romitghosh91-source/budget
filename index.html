<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Budget"/>
<title>Budget</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Sora',system-ui,sans-serif;background:#F0F4FF;color:#1A1A2E;min-height:100vh;overflow-x:hidden}
input,select,textarea{font-family:'Sora',system-ui,sans-serif;-webkit-appearance:none}
input[type=date]{color-scheme:light}
::-webkit-scrollbar{display:none}
.header{background:linear-gradient(135deg,#2563EB,#7C3AED);padding:20px;color:#fff;padding-top:max(20px,env(safe-area-inset-top))}
.content{padding:16px 20px;padding-bottom:100px}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 1px 8px rgba(0,0,0,0.06)}
.metric{background:linear-gradient(135deg,#EF4444,#F97316);color:#fff;border-radius:14px;padding:16px;margin-bottom:10px;flex:1}
.metric.green{background:linear-gradient(135deg,#10B981,#059669)}
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #E2E8F0;display:flex;justify-content:space-around;padding:10px 0;padding-bottom:max(10px,env(safe-area-inset-bottom));z-index:50}
.nav-btn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:#94A3B8;font-size:11px;font-weight:500;padding:5px}
.nav-btn.active{color:#2563EB}
.fab{position:fixed;bottom:90px;right:20px;width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg,#2563EB,#7C3AED);border:none;color:#fff;font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(37,99,235,0.4);z-index:40}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:flex-end}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:24px;width:100%;max-height:85vh;overflow-y:auto}
.modal input,.modal select,.modal textarea{width:100%;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:10px;padding:10px 12px;color:#1A1A2E;font-size:14px;margin-bottom:10px;outline:none;font-family:'Sora',system-ui,sans-serif}
.btn{border:none;border-radius:10px;padding:10px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Sora',system-ui,sans-serif}
.btn-primary{background:linear-gradient(135deg,#2563EB,#7C3AED);color:#fff;width:100%;margin-bottom:8px}
.btn-secondary{background:#EFF6FF;color:#2563EB;padding:3px 8px;font-size:11px}
.btn-danger{background:#FEE2E2;color:#EF4444;padding:3px 8px;font-size:11px}
.expense-row{display:flex;gap:10px;padding:12px 0;border-bottom:1px solid #F1F5F9;align-items:flex-start}
.expense-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px}
.expense-info{flex:1;font-size:13px}
.expense-title{font-weight:600}
.expense-date{font-size:11px;color:#94A3B8;margin-top:4px}
.expense-amount{display:flex;flex-direction:column;align-items:flex-end;gap:4px;font-weight:600;color:#EF4444}
.button-group{display:flex;gap:4px}
.section-label{font-size:11px;font-weight:600;color:#94A3B8;text-transform:uppercase;margin-bottom:12px;margin-top:12px}
</style>
</head>
<body>
<div class="header">
<div style="font-size:11px;font-weight:600;letter-spacing:0.18em;color:rgba(255,255,255,0.7);text-transform:uppercase;margin-bottom:4px">Budget</div>
<div style="display:flex;justify-content:space-between;align-items:center">
<button onclick="prevMonth()" style="background:rgba(255,255,255,0.2);border:none;border-radius:8px;color:#fff;width:32px;height:32px;cursor:pointer;font-size:16px">‹</button>
<div id="monthLabel" style="font-size:20px;font-weight:300;letter-spacing:-0.02em;color:#fff">June 2026</div>
<button onclick="nextMonth()" style="background:rgba(255,255,255,0.2);border:none;border-radius:8px;color:#fff;width:32px;height:32px;cursor:pointer;font-size:16px">›</button>
</div>
</div>

<div class="content" id="content"></div>

<div class="nav">
<button class="nav-btn active" onclick="setView('dashboard')">Home</button>
<button class="nav-btn" onclick="setView('expenses')">Expenses</button>
<button class="nav-btn" onclick="setView('budget')">Budget</button>
<button class="nav-btn" onclick="setView('reports')">Reports</button>
<button class="nav-btn" onclick="setView('cards')">Cards</button>
</div>

<button id="fab" class="fab" style="display:none" onclick="showModal()">+</button>

<div id="modalContainer"></div>

<script>
const SK="romit_budget_v1";
const CATS=["Food & Dining","Travel & Transport","Shopping","Entertainment","Health & Wellness","Home & Utilities","Subscriptions","Investments","Business Expenses","Charitable Donations","Bandit Expenses","Annual Overheads","Miscellaneous"];
const ICONS={"Food & Dining":"🍽","Travel & Transport":"🚗","Shopping":"🛍","Entertainment":"🎬","Health & Wellness":"💊","Home & Utilities":"🏠","Subscriptions":"📱","Investments":"📈","Business Expenses":"💼","Charitable Donations":"🤲","Bandit Expenses":"🐾","Annual Overheads":"📅","Miscellaneous":"📦"};
const CLRS={"Food & Dining":"#E05C3A","Travel & Transport":"#2563EB","Shopping":"#7C3AED","Entertainment":"#DB2777","Health & Wellness":"#059669","Home & Utilities":"#D97706","Subscriptions":"#0891B2","Investments":"#16A34A","Business Expenses":"#0F766E","Charitable Donations":"#7C3AED","Bandit Expenses":"#C4782A","Annual Overheads":"#64748B","Miscellaneous":"#94A3B8"};

let data={cards:[],expenses:[],budgets:{},overheads:[],monthlyIncome:{}};
let currentMonth="2026-06";
let currentView="dashboard";

const fmt=(n)=>new Intl.NumberFormat("en-IN",{style:"currency",currency:"INR",maximumFractionDigits:0}).format(n);
const mLbl=(ym)=>{const[y,m]=ym.split("-");return new Date(y,m-1).toLocaleDateString("en-IN",{month:"long",year:"numeric"})};
const nextMStr=(ym)=>{const[y,m]=ym.split("-").map(Number);const d=new Date(y,m);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`};
const prevMStr=(ym)=>{const[y,m]=ym.split("-").map(Number);const d=new Date(y,m-2);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`};
function allMonthsBetween(start,end){const months=[];let cur=start;while(cur<=end){months.push(cur);cur=nextMStr(cur);}return months;}

function load(){try{const r=localStorage.getItem(SK);if(r)data=JSON.parse(r)}catch{}}
function save(){try{localStorage.setItem(SK,JSON.stringify(data))}catch{}}

function render(){
  document.getElementById("monthLabel").innerText=mLbl(currentMonth);
  const fab=document.getElementById("fab");
  fab.style.display=(currentView==="expenses"||currentView==="cards"||currentView==="overheads")?"flex":"none";
  
  if(currentView==="dashboard")renderDashboard();
  else if(currentView==="expenses")renderExpenses();
  else if(currentView==="budget")renderBudget();
  else if(currentView==="reports")renderReports();
  else if(currentView==="cards")renderCards();
  else if(currentView==="overheads")renderOverheads();
  
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  const navMap={dashboard:0,expenses:1,budget:2,reports:3,cards:4};
  if(navMap[currentView]!==undefined)document.querySelectorAll(".nav-btn")[navMap[currentView]].classList.add("active");
}

function renderDashboard(){
  const mExps=data.expenses.filter(e=>e.month===currentMonth);
  const spent=mExps.reduce((s,e)=>s+Number(e.amount),0);
  const income=data.monthlyIncome[currentMonth]||0;
  const savings=income-spent;
  const firstMonth=Object.keys(data.monthlyIncome).sort()[0]||currentMonth;
  const allMonths=allMonthsBetween(firstMonth,currentMonth);
  const cumSavings=allMonths.reduce((acc,m)=>{const mInc=data.monthlyIncome[m]||0;const mSp=data.expenses.filter(e=>e.month===m).reduce((s,e)=>s+Number(e.amount),0);return acc+(mInc-mSp)},0);
  const spBandit=mExps.filter(e=>e.category==="Bandit Expenses").reduce((s,e)=>s+Number(e.amount),0);
  const persSp=mExps.filter(e=>e.type==="personal").reduce((s,e)=>s+Number(e.amount),0);
  const bizSp=mExps.filter(e=>e.type==="business").reduce((s,e)=>s+Number(e.amount),0);
  
  let html=`<div class="card" style="display:flex;justify-content:space-between;align-items:center">
    <div><div style="font-size:11px;color:#6366F1;font-weight:600;text-transform:uppercase">Monthly Income</div>
    <div style="font-size:22px;font-weight:600;color:#1E1B4B;margin-top:2px">${income>0?fmt(income):"Not set"}</div></div>
    <button class="btn btn-primary" style="width:auto;padding:8px 14px;margin:0" onclick="setIncome()">Edit</button>
  </div>`;
  
  html+=`<div style="display:flex;gap:10px;margin-bottom:14px">
    <div class="metric"><div style="font-size:10px;font-weight:600;text-transform:uppercase;opacity:0.9">Spent</div>
    <div style="font-size:22px;font-weight:600;margin-top:6px">${fmt(spent)}</div></div>
    <div class="metric ${savings>=0?'green':''}"><div style="font-size:10px;font-weight:600;text-transform:uppercase;opacity:0.9">Savings</div>
    <div style="font-size:22px;font-weight:600;margin-top:6px">${fmt(Math.abs(savings))}</div></div>
  </div>`;
  
  html+=`<div class="card" style="background:linear-gradient(135deg,#1E1B4B,#312E81);color:#fff">
    <div style="font-size:11px;color:rgba(255,255,255,0.6);letter-spacing:0.08em;font-weight:600;text-transform:uppercase;margin-bottom:6px">Overall Saved</div>
    <div style="font-size:28px;font-weight:300;letter-spacing:-0.02em">${fmt(cumSavings)}</div>
    <div style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:4px">across ${allMonths.length} month${allMonths.length!==1?'s':''}</div>
  </div>`;
  
  html+=`<div style="display:flex;gap:10px;margin-bottom:14px">
    <div class="metric" style="background:linear-gradient(135deg,#EFF6FF,#F5F3FF);color:#1A1A2E"><div style="font-size:10px;font-weight:600;text-transform:uppercase;opacity:0.7">Personal</div>
    <div style="font-size:18px;font-weight:600;margin-top:4px">${fmt(persSp)}</div></div>
    <div class="metric" style="background:linear-gradient(135deg,#F0FDF4,#ECFDF5);color:#1A1A2E"><div style="font-size:10px;font-weight:600;text-transform:uppercase;opacity:0.7">Business</div>
    <div style="font-size:18px;font-weight:600;margin-top:4px">${fmt(bizSp)}</div></div>
  </div>`;
  
  if(spBandit>0){
    html+=`<div class="card" style="border-left:4px solid #C4782A">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><div style="font-size:11px;color:#C4782A;font-weight:600;text-transform:uppercase;margin-bottom:4px">🐾 Bandit This Month</div>
        <div style="font-size:22px;font-weight:600;color:#1A1A2E">${fmt(spBandit)}</div></div>
      </div>
    </div>`;
  }
  
  document.getElementById("content").innerHTML=html;
}

function renderExpenses(){
  const mExps=data.expenses.filter(e=>e.month===currentMonth).sort((a,b)=>new Date(b.date)-new Date(a.date));
  let html=`<div class="section-label">Expenses</div>`;
  
  if(mExps.length===0){
    html+=`<div style="text-align:center;color:#94A3B8;padding:40px 0">No expenses this month</div>`;
  }else{
    mExps.forEach(e=>{
      html+=`<div class="expense-row"><div class="expense-dot" style="background:${CLRS[e.category]}"></div>
        <div class="expense-info"><div class="expense-title">${e.title}</div>
        <div style="font-size:10px;color:#94A3B8;margin-top:2px">${e.category}${e.type==="business"?" • Business":""}</div>
        <div class="expense-date">${new Date(e.date).toLocaleDateString("en-IN")}</div></div>
        <div class="expense-amount">${fmt(e.amount)}<div class="button-group">
        <button class="btn btn-secondary" onclick="editExp('${e.id}')">Edit</button>
        <button class="btn btn-danger" onclick="deleteExp('${e.id}')">Del</button>
        </div></div></div>`;
    });
  }
  
  document.getElementById("content").innerHTML=html;
}

function renderBudget(){
  const budM=data.budgets[currentMonth]||{};
  const mExps=data.expenses.filter(e=>e.month===currentMonth);
  const spByCat=CATS.reduce((acc,c)=>{acc[c]=mExps.filter(e=>e.category===c).reduce((s,e)=>s+Number(e.amount),0);return acc},{});
  
  let html=`<div class="section-label">Budget vs Spend</div>`;
  
  CATS.forEach(cat=>{
    const spent=spByCat[cat];
    const budget=budM[cat]||0;
    const pct=budget>0?(spent/budget)*100:0;
    
    html+=`<div class="card" style="padding:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="display:flex;gap:8px;align-items:center"><span style="font-size:18px">${ICONS[cat]}</span>
        <div><div style="font-size:13px;font-weight:600">${cat}</div>
        <div style="font-size:11px;color:#94A3B8">${fmt(spent)}${budget>0?` of ${fmt(budget)}`:" (no budget)"}</div></div></div>
        <button class="btn btn-secondary" style="padding:4px 8px;font-size:10px" onclick="setBudget('${cat}')">Set</button>
      </div>
      ${budget>0?`<div style="background:#F1F5F9;border-radius:3px;height:6px;overflow:hidden">
        <div style="background:${pct>100?"#EF4444":pct>70?"#F59E0B":"#2563EB"};height:100%;width:${Math.min(pct,100)}%"></div>
      </div>`:""}</div>`;
  });
  
  document.getElementById("content").innerHTML=html;
}

function renderReports(){
  const mExps=data.expenses.filter(e=>e.month===currentMonth);
  const spByCat=CATS.reduce((acc,c)=>{acc[c]=mExps.filter(e=>e.category===c).reduce((s,e)=>s+Number(e.amount),0);return acc},{});
  
  let html=`<div class="section-label">Spend Breakdown</div>`;
  
  CATS.filter(c=>spByCat[c]>0).forEach(cat=>{
    html+=`<div class="card" style="display:flex;justify-content:space-between;align-items:center;padding:12px">
      <div style="display:flex;gap:10px;align-items:center"><span style="font-size:18px">${ICONS[cat]}</span>
      <div><div style="font-size:13px;font-weight:600">${cat}</div></div></div>
      <div style="font-size:14px;font-weight:600">${fmt(spByCat[cat])}</div>
    </div>`;
  });
  
  const donTotal=data.expenses.filter(e=>e.category==="Charitable Donations").reduce((s,e)=>s+Number(e.amount),0);
  if(donTotal>0){
    html+=`<div class="section-label" style="margin-top:20px">Charitable Donations (80G)</div>
    <div class="card" style="border-left:4px solid #7C3AED">
      <div style="font-size:11px;color:#7C3AED;font-weight:600">All time total</div>
      <div style="font-size:22px;font-weight:600;color:#1A1A2E;margin-top:6px">${fmt(donTotal)}</div>
    </div>`;
  }
  
  document.getElementById("content").innerHTML=html;
}

function renderCards(){
  let html=`<div class="section-label">My Cards</div>`;
  if(data.cards.length===0){
    html+=`<div style="text-align:center;color:#94A3B8;padding:40px 0">No cards added</div>`;
  }else{
    data.cards.forEach(c=>{
      html+=`<div class="card" style="display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:14px;font-weight:600">${c.name}</div><div style="font-size:11px;color:#94A3B8;margin-top:2px">${c.bank}</div></div>
        <button class="btn btn-danger" onclick="delCard('${c.id}')">Remove</button>
      </div>`;
    });
  }
  document.getElementById("content").innerHTML=html;
}

function renderOverheads(){
  let html=`<div class="section-label">Fixed Payments</div>`;
  if(data.overheads.length===0){
    html+=`<div style="text-align:center;color:#94A3B8;padding:40px 0">No fixed payments</div>`;
  }else{
    data.overheads.forEach(oh=>{
      html+=`<div class="card"><div style="display:flex;justify-content:space-between">
        <div><div style="font-size:14px;font-weight:600">${oh.title}</div>
        <div style="font-size:11px;color:#94A3B8;margin-top:2px">${oh.frequency}${oh.nextDue?" • Due: "+oh.nextDue:""}</div></div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px"><div style="font-size:15px;font-weight:600">${fmt(oh.amount)}</div>
        <button class="btn btn-danger" onclick="delOh('${oh.id}')">Delete</button></div>
      </div></div>`;
    });
  }
  document.getElementById("content").innerHTML=html;
}

function setView(v){currentView=v;render()}
function prevMonth(){currentMonth=prevMStr(currentMonth);render()}
function nextMonth(){currentMonth=nextMStr(currentMonth);render()}
function setIncome(){const v=prompt("Income:",data.monthlyIncome[currentMonth]||"");if(v&&!isNaN(v)){data.monthlyIncome[currentMonth]=Number(v);save();render()}}
function setBudget(cat){const v=prompt("Budget for "+cat,data.budgets[currentMonth]?.[cat]||"");if(v&&!isNaN(v)){data.budgets[currentMonth]={...data.budgets[currentMonth]||{},[cat]:Number(v)};save();render()}}
function deleteExp(id){data.expenses=data.expenses.filter(e=>e.id!==id);save();render()}
function editExp(id){const e=data.expenses.find(x=>x.id===id);showExpModal(e)}
function delCard(id){data.cards=data.cards.filter(c=>c.id!==id);save();render()}
function delOh(id){data.overheads=data.overheads.filter(o=>o.id!==id);save();render()}

function showModal(){
  if(currentView==="expenses")showExpModal();
  else if(currentView==="cards")showCardModal();
  else if(currentView==="overheads")showOhModal();
}

function showExpModal(existing){
  let html=`<div class="modal-overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">
    <div style="font-size:16px;font-weight:600;margin-bottom:16px">${existing?"Edit":"Add"} expense</div>
    <input id="et" placeholder="Title" value="${existing?.title||""}"/>
    <input id="ed" placeholder="Description" value="${existing?.description||""}"/>
    <input id="ea" placeholder="Amount" type="number" value="${existing?.amount||""}"/>
    <select id="ec">${CATS.map(c=>`<option ${(existing?.category||"Food & Dining")===c?"selected":""}>${c}</option>`).join("")}</select>
    <select id="ecard"><option value="Cash">Cash / UPI</option>${data.cards.map(c=>`<option value="${c.id}" ${existing?.card===c.id?"selected":""}>${c.name}</option>`).join("")}</select>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      <select id="etype"><option value="personal" ${existing?.type!=="business"?"selected":""}>Personal</option><option value="business" ${existing?.type==="business"?"selected":""}>Business</option></select>
      <input id="edate" type="date" value="${existing?.date||new Date().toISOString().split("T")[0]}"/>
    </div>
    <button class="btn btn-primary" onclick="saveExp('${existing?.id||""}')">Save</button>
    <button class="btn" style="background:#F8FAFC;color:#64748B;width:100%" onclick="closeModal()">Cancel</button>
  </div></div>`;
  document.getElementById("modalContainer").innerHTML=html;
}

function saveExp(id){
  const title=document.getElementById("et").value.trim();
  const desc=document.getElementById("ed").value.trim();
  const amount=Number(document.getElementById("ea").value);
  const cat=document.getElementById("ec").value;
  const card=document.getElementById("ecard").value;
  const type=document.getElementById("etype").value;
  const date=document.getElementById("edate").value;
  if(!title||!amount)return;
  const month=date.slice(0,7);
  if(id){
    const idx=data.expenses.findIndex(e=>e.id===id);
    if(idx>=0)data.expenses[idx]={id,title,description:desc,amount,category:cat,card,type,date,month};
  }else{
    data.expenses.push({id:Date.now().toString(),title,description:desc,amount,category:cat,card,type,date,month});
  }
  save();render();closeModal();
}

function showCardModal(){
  let html=`<div class="modal-overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">
    <div style="font-size:16px;font-weight:600;margin-bottom:16px">Add card</div>
    <input id="cn" placeholder="Card name"/>
    <input id="cb" placeholder="Bank"/>
    <button class="btn btn-primary" onclick="saveCard()">Add</button>
    <button class="btn" style="background:#F8FAFC;color:#64748B;width:100%" onclick="closeModal()">Cancel</button>
  </div></div>`;
  document.getElementById("modalContainer").innerHTML=html;
}

function saveCard(){
  const name=document.getElementById("cn").value.trim();
  const bank=document.getElementById("cb").value.trim();
  if(!name)return;
  data.cards.push({id:Date.now().toString(),name,bank});
  save();render();closeModal();
}

function showOhModal(){
  let html=`<div class="modal-overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">
    <div style="font-size:16px;font-weight:600;margin-bottom:16px">Add fixed payment</div>
    <input id="ot" placeholder="Title"/>
    <input id="oa" placeholder="Amount" type="number"/>
    <select id="ofreq"><option>Monthly</option><option>Quarterly</option><option>Half-yearly</option><option>Annually</option></select>
    <input id="odate" type="date"/>
    <button class="btn btn-primary" onclick="saveOh()">Add</button>
    <button class="btn" style="background:#F8FAFC;color:#64748B;width:100%" onclick="closeModal()">Cancel</button>
  </div></div>`;
  document.getElementById("modalContainer").innerHTML=html;
}

function saveOh(){
  const title=document.getElementById("ot").value.trim();
  const amount=Number(document.getElementById("oa").value);
  const freq=document.getElementById("ofreq").value;
  const date=document.getElementById("odate").value;
  if(!title||!amount)return;
  data.overheads.push({id:Date.now().toString(),title,amount,frequency:freq,nextDue:date});
  save();render();closeModal();
}

function closeModal(){document.getElementById("modalContainer").innerHTML=""}

window.addEventListener('load',()=>{
  currentMonth=new Date().getFullYear()+"-"+String(new Date().getMonth()+1).padStart(2,"0");
  load();
  render();
});
</script>
</body>
</html>
