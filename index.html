<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Budget"/>
<title>Budget</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Sora',system-ui,sans-serif;background:#F0F4FF;color:#1A1A2E;min-height:100vh;overflow-x:hidden}
input,select,textarea{font-family:'Sora',system-ui,sans-serif;-webkit-appearance:none;appearance:none}
input[type=date]{color-scheme:light}
::-webkit-scrollbar{display:none}
</style>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useCallback}=React;
const SK="romit_budget_v1";
const CATS=["Food & Dining","Travel & Transport","Shopping","Entertainment","Health & Wellness","Home & Utilities","Subscriptions","Investments","Business Expenses","Charitable Donations","Bandit Expenses","Annual Overheads","Miscellaneous"];
const ICONS={"Food & Dining":"🍽","Travel & Transport":"🚗","Shopping":"🛍","Entertainment":"🎬","Health & Wellness":"💊","Home & Utilities":"🏠","Subscriptions":"📱","Investments":"📈","Business Expenses":"💼","Charitable Donations":"🤲","Bandit Expenses":"🐾","Annual Overheads":"📅","Miscellaneous":"📦"};
const CLRS={"Food & Dining":"#E05C3A","Travel & Transport":"#2563EB","Shopping":"#7C3AED","Entertainment":"#DB2777","Health & Wellness":"#059669","Home & Utilities":"#D97706","Subscriptions":"#0891B2","Investments":"#16A34A","Business Expenses":"#0F766E","Charitable Donations":"#7C3AED","Bandit Expenses":"#C4782A","Annual Overheads":"#64748B","Miscellaneous":"#94A3B8"};

const fmt=(n)=>new Intl.NumberFormat("en-IN",{style:"currency",currency:"INR",maximumFractionDigits:0}).format(n);
const fmtS=(n)=>n>=100000?`₹${(n/100000).toFixed(1)}L`:n>=1000?`₹${(n/1000).toFixed(0)}K`:`₹${Math.round(n)}`;
const curM=()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`};
const mLbl=(ym)=>{const[y,m]=ym.split("-");return new Date(y,m-1).toLocaleDateString("en-IN",{month:"long",year:"numeric"})};
const ld=()=>{try{const r=localStorage.getItem(SK);return r?JSON.parse(r):null}catch{return null}};
const sv=(d)=>{try{localStorage.setItem(SK,JSON.stringify(d))}catch{}};
const def=()=>({cards:[],expenses:[],budgets:{},overheads:[],monthlyIncome:{}});

function App(){
  const[data,setData]=useState(()=>ld()||def());
  const[view,setView]=useState("dashboard");
  const[am,setAm]=useState(curM());
  const[showExp,setShowExp]=useState(false);
  const[showCard,setShowCard]=useState(false);
  const[showOh,setShowOh]=useState(false);
  const[showBudget,setShowBudget]=useState(false);
  const[editExp,setEditExp]=useState(null);

  useEffect(()=>{sv(data)},[data]);

  const mExps=data.expenses.filter(e=>e.month===am);
  const totalSp=mExps.reduce((s,e)=>s+Number(e.amount),0);
  const income=data.monthlyIncome[am]||0;
  const thisMthSavings=income-totalSp;
  const budM=data.budgets[am]||{};
  const spByCat=CATS.reduce((acc,c)=>{acc[c]=mExps.filter(e=>e.category===c).reduce((s,e)=>s+Number(e.amount),0);return acc},{});

  const addExp=(e)=>{const id=Date.now().toString();const month=e.date.slice(0,7);setData(p=>({...p,expenses:[...p.expenses,{id,...e,month}]}))};
  const updateExp=(id,updates)=>setData(p=>({...p,expenses:p.expenses.map(e=>e.id===id?{...e,...updates}:e)}));
  const delExp=(id)=>setData(p=>({...p,expenses:p.expenses.filter(e=>e.id!==id)}));
  const addCard=(c)=>setData(p=>({...p,cards:[...p.cards,{id:Date.now().toString(),...c}]}));
  const delCard=(id)=>setData(p=>({...p,cards:p.cards.filter(c=>c.id!==id)}));
  const addOh=(oh)=>setData(p=>({...p,overheads:[...p.overheads,{id:Date.now().toString(),...oh}]}));
  const delOh=(id)=>setData(p=>({...p,overheads:p.overheads.filter(o=>o.id!==id)}));
  const saveBudget=(cat,amt)=>setData(p=>({...p,budgets:{...p.budgets,[am]:{...(p.budgets[am]||{}),[cat]:Number(amt)}}}));
  const setIncome=(v)=>setData(p=>({...p,monthlyIncome:{...p.monthlyIncome,[am]:Number(v)}}));
  const prevM=()=>{const[y,m]=am.split("-").map(Number);const d=new Date(y,m-2);setAm(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`)};
  const nextM=()=>{const[y,m]=am.split("-").map(Number);const d=new Date(y,m);setAm(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`)};

  return(
    <div style={{minHeight:"100vh",background:"#F0F4FF",paddingBottom:80}}>
      <div style={{background:"linear-gradient(135deg,#2563EB 0%,#7C3AED 100%)",padding:"20px",paddingTop:"max(20px,env(safe-area-inset-top))",color:"#fff"}}>
        <div style={{fontSize:11,fontWeight:600,letterSpacing:"0.18em",color:"rgba(255,255,255,0.7)",textTransform:"uppercase",marginBottom:4}}>Budget</div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <button onClick={prevM} style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:8,color:"#fff",width:32,height:32,cursor:"pointer",fontSize:16}}>‹</button>
          <div style={{fontSize:20,fontWeight:300,letterSpacing:"-0.02em"}}>{mLbl(am)}</div>
          <button onClick={nextM} style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:8,color:"#fff",width:32,height:32,cursor:"pointer",fontSize:16}}>›</button>
        </div>
      </div>

      <div style={{padding:"16px 20px"}}>
        {view==="dashboard"&&(
          <>
            <div style={{background:"linear-gradient(135deg,#EFF6FF,#F5F3FF)",borderRadius:16,padding:16,marginBottom:14}}>
              <div style={{fontSize:11,color:"#6366F1",letterSpacing:"0.08em",fontWeight:600,textTransform:"uppercase",marginBottom:6}}>Monthly Income</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontSize:22,fontWeight:600,color:"#1E1B4B"}}>{income>0?fmt(income):"Not set"}</div>
                <button onClick={()=>{const v=prompt("Income:",income||"");if(v)setIncome(v)}} style={{background:"#6366F1",border:"none",borderRadius:10,color:"#fff",padding:"8px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>Edit</button>
              </div>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
              <div style={{background:"linear-gradient(135deg,#EF4444,#F97316)",borderRadius:14,padding:16,color:"#fff"}}>
                <div style={{fontSize:10,fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",opacity:0.9}}>Spent</div>
                <div style={{fontSize:22,fontWeight:600,marginTop:6}}>{fmtS(totalSp)}</div>
              </div>
              <div style={{background:thisMthSavings>=0?"linear-gradient(135deg,#10B981,#059669)":"linear-gradient(135deg,#EF4444,#DC2626)",borderRadius:14,padding:16,color:"#fff"}}>
                <div style={{fontSize:10,fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",opacity:0.9}}>Savings</div>
                <div style={{fontSize:22,fontWeight:600,marginTop:6}}>{fmtS(Math.abs(thisMthSavings))}</div>
              </div>
            </div>

            {Object.keys(spByCat).filter(c=>spByCat[c]>0).map(cat=>(
              <div key={cat} style={{background:"#fff",borderRadius:16,padding:14,marginBottom:10,boxShadow:"0 1px 8px rgba(0,0,0,0.06)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{display:"flex",gap:10,alignItems:"center"}}>
                    <span style={{fontSize:18}}>{ICONS[cat]}</span>
                    <div><div style={{fontSize:13,fontWeight:600}}>{cat}</div><div style={{fontSize:11,color:"#94A3B8"}}>{fmt(spByCat[cat])}</div></div>
                  </div>
                  <button onClick={()=>setShowBudget(cat)} style={{background:"#EFF6FF",border:"none",borderRadius:8,color:"#2563EB",padding:"5px 10px",fontSize:11,fontWeight:600,cursor:"pointer"}}>Set</button>
                </div>
              </div>
            ))}
          </>
        )}

        {view==="expenses"&&(
          <>
            <div style={{fontSize:11,fontWeight:600,color:"#94A3B8",textTransform:"uppercase",marginBottom:12}}>Expenses</div>
            {mExps.length===0?<div style={{textAlign:"center",color:"#94A3B8",padding:"40px 0"}}>No expenses this month</div>:(
              mExps.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(e=>(
                <div key={e.id} style={{background:"#fff",borderRadius:14,padding:14,marginBottom:10}}>
                  <div style={{display:"flex",gap:10}}>
                    <div style={{width:10,height:10,borderRadius:"50%",background:CLRS[e.category],marginTop:3}}></div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:600}}>{e.title}</div>
                      <div style={{fontSize:11,color:"#94A3B8",marginTop:4}}>{new Date(e.date).toLocaleDateString("en-IN")}</div>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                      <div style={{fontSize:15,fontWeight:600,color:"#EF4444"}}>{fmt(e.amount)}</div>
                      <div style={{display:"flex",gap:4}}>
                        <button onClick={()=>setEditExp(e)} style={{background:"#EFF6FF",border:"none",borderRadius:6,color:"#2563EB",padding:"3px 8px",fontSize:11,cursor:"pointer"}}>Edit</button>
                        <button onClick={()=>delExp(e.id)} style={{background:"#FEE2E2",border:"none",borderRadius:6,color:"#EF4444",padding:"3px 8px",fontSize:11,cursor:"pointer"}}>Delete</button>
                      </div>
                    </div>
                  </div>
                </div>
              ))
            )}
          </>
        )}

        {view==="cards"&&(
          <>
            <div style={{fontSize:11,fontWeight:600,color:"#94A3B8",textTransform:"uppercase",marginBottom:12}}>My Cards</div>
            {data.cards.map(c=>(
              <div key={c.id} style={{background:"#fff",borderRadius:14,padding:14,marginBottom:10,display:"flex",justifyContent:"space-between"}}>
                <div><div style={{fontSize:14,fontWeight:600}}>{c.name}</div><div style={{fontSize:11,color:"#94A3B8",marginTop:2}}>{c.bank}</div></div>
                <button onClick={()=>delCard(c.id)} style={{background:"#FEE2E2",border:"none",borderRadius:8,color:"#EF4444",padding:"6px 10px",fontSize:12,cursor:"pointer"}}>Remove</button>
              </div>
            ))}
          </>
        )}
      </div>

      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#fff",borderTop:"1px solid #E2E8F0",display:"flex",justifyContent:"space-around",padding:"10px 0",paddingBottom:"max(10px,env(safe-area-inset-bottom))"}}>
        {["dashboard","expenses","cards"].map(v=>(
          <button key={v} onClick={()=>setView(v)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:view===v?"#2563EB":"#94A3B8",fontSize:11,fontWeight:500}}>
            {v==="dashboard"?"Home":v==="expenses"?"Expenses":"Cards"}
          </button>
        ))}
      </div>

      {showExp&&<ExpModal existing={editExp} cards={data.cards} am={am} onClose={()=>{setShowExp(false);setEditExp(null)}} onSave={(e)=>{editExp?updateExp(editExp.id,e):addExp(e);setShowExp(false);setEditExp(null)}}/>}
      {showCard&&<CardModal onClose={()=>setShowCard(false)} onSave={addCard}/>}
      {typeof showBudget==="string"&&<BudModal cat={showBudget} cur={budM[showBudget]||""} onClose={()=>setShowBudget(false)} onSave={(a)=>{saveBudget(showBudget,a);setShowBudget(false)}}/>}

      {view==="expenses"&&<button onClick={()=>setShowExp(true)} style={{position:"fixed",bottom:90,right:20,width:52,height:52,borderRadius:16,background:"linear-gradient(135deg,#2563EB,#7C3AED)",border:"none",color:"#fff",fontSize:24,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 20px rgba(37,99,235,0.4)"}}>+</button>}
      {view==="cards"&&<button onClick={()=>setShowCard(true)} style={{position:"fixed",bottom:90,right:20,width:52,height:52,borderRadius:16,background:"linear-gradient(135deg,#2563EB,#7C3AED)",border:"none",color:"#fff",fontSize:24,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 20px rgba(37,99,235,0.4)"}}>+</button>}
    </div>
  );
}

function ExpModal({existing,cards,am,onClose,onSave}){
  const[title,setTitle]=useState(existing?.title||"");
  const[amt,setAmt]=useState(existing?.amount||"");
  const[cat,setCat]=useState(existing?.category||"Food & Dining");
  const[card,setCard]=useState(existing?.card||cards[0]?.id||"Cash");
  const[date,setDate]=useState(existing?.date||new Date().toISOString().split("T")[0]);
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:200,display:"flex",alignItems:"flex-end"}}>
      <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:24,paddingBottom:"max(24px,env(safe-area-inset-bottom))",width:"100%",maxHeight:"85vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:16,fontWeight:600,marginBottom:16,color:"#1A1A2E"}}>{existing?"Edit":"Add"} expense</div>
        <input style={{width:"100%",background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:10,padding:"10px 12px",color:"#1A1A2E",fontSize:14,marginBottom:10,outline:"none"}} placeholder="Title" value={title} onChange={e=>setTitle(e.target.value)}/>
        <input style={{width:"100%",background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:10,padding:"10px 12px",color:"#1A1A2E",fontSize:14,marginBottom:10,outline:"none"}} placeholder="Amount" type="number" value={amt} onChange={e=>setAmt(e.target.value)}/>
        <select style={{width:"100%",background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:10,padding:"10px 12px",color:"#1A1A2E",fontSize:14,marginBottom:10,outline:"none"}} value={cat} onChange={e=>setCat(e.target.value)}>{CATS.map(c=><option key={c}>{c}</option>)}</select>
        <select style={{width:"100%",background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:10,padding:"10px 12px",color:"#1A1A2E",fontSize:14,marginBottom:10,outline:"none"}} value={card} onChange={e=>setCard(e.target.value)}>{cards.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}<option value="Cash">Cash</option></select>
        <input style={{width:"100%",background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:10,padding:"10px 12px",color:"#1A1A2E",fontSize:14,marginBottom:10,outline:"none"}} type="date" value={date} onChange={e=>setDate(e.target.value)}/>
        <button onClick={()=>{if(title.trim()&&amt)onSave({title:title.trim(),amount:parseFloat(amt),category:cat,card,date})}} style={{width:"100%",padding:13,borderRadius:12,background:"linear-gradient(135deg,#2563EB,#7C3AED)",border:"none",color:"#fff",fontSize:15,fontWeight:600,cursor:"pointer",marginTop:6}}>Save</button>
        <button onClick={onClose} style={{width:"100%",padding:11,borderRadius:12,background:"transparent",border:"1px solid #E2E8F0",color:"#64748B",fontSize:14,cursor:"pointer",marginTop:8}}>Cancel</button>
      </div>
    </div>
  );
}

function CardModal({onClose,onSave}){
  const[name,setName]=useState("");
  const[bank,setBank]=useState("");
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:200,display:"flex",alignItems:"flex-end"}}>
      <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:24,width:"100%"}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:16,fontWeight:600,marginBottom:16}}>Add card</div>
        <input style={{width:"100%",background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:10,padding:"10px 12px",color:"#1A1A2E",fontSize:14,marginBottom:10,outline:"none"}} placeholder="Card name" value={name} onChange={e=>setName(e.target.value)}/>
        <input style={{width:"100%",background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:10,padding:"10px 12px",color:"#1A1A2E",fontSize:14,marginBottom:10,outline:"none"}} placeholder="Bank" value={bank} onChange={e=>setBank(e.target.value)}/>
        <button onClick={()=>{if(name.trim())onSave({name:name.trim(),bank})}} style={{width:"100%",padding:13,borderRadius:12,background:"linear-gradient(135deg,#2563EB,#7C3AED)",border:"none",color:"#fff",fontSize:15,fontWeight:600,cursor:"pointer",marginTop:6}}>Add</button>
        <button onClick={onClose} style={{width:"100%",padding:11,borderRadius:12,background:"transparent",border:"1px solid #E2E8F0",color:"#64748B",fontSize:14,cursor:"pointer",marginTop:8}}>Cancel</button>
      </div>
    </div>
  );
}

function BudModal({cat,cur,onClose,onSave}){
  const[val,setVal]=useState(cur);
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:200,display:"flex",alignItems:"flex-end"}}>
      <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:24,width:"100%"}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:16,fontWeight:600,marginBottom:16}}>Set budget - {cat}</div>
        <input style={{width:"100%",background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:10,padding:"10px 12px",color:"#1A1A2E",fontSize:14,marginBottom:10,outline:"none"}} placeholder="Budget" type="number" value={val} onChange={e=>setVal(e.target.value)}/>
        <button onClick={()=>onSave(val)} style={{width:"100%",padding:13,borderRadius:12,background:"linear-gradient(135deg,#2563EB,#7C3AED)",border:"none",color:"#fff",fontSize:15,fontWeight:600,cursor:"pointer",marginTop:6}}>Save</button>
        <button onClick={onClose} style={{width:"100%",padding:11,borderRadius:12,background:"transparent",border:"1px solid #E2E8F0",color:"#64748B",fontSize:14,cursor:"pointer",marginTop:8}}>Cancel</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
