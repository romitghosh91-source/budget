<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Budget"/>
<title>Budget</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Sora',system-ui,sans-serif;background:#F0F4FF;color:#1A1A2E;min-height:100vh}
input,select,textarea{font-family:'Sora',system-ui,sans-serif;-webkit-appearance:none}
input[type=date]{color-scheme:light}
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body>
<div id="root"></div>
<script>
const{useState,useEffect}=React;
const SK="romit_budget_v1";

const fmt=n=>new Intl.NumberFormat("en-IN",{style:"currency",currency:"INR",maximumFractionDigits:0}).format(n);

function App(){
const[data,setData]=useState(()=>{
try{const r=localStorage.getItem(SK);return r?JSON.parse(r):{expenses:[],monthlyIncome:{}}}catch{return{expenses:[],monthlyIncome:{}}}
});
const[view,setView]=useState("dashboard");
const[am,setAm]=useState(new Date().getFullYear()+"-"+String(new Date().getMonth()+1).padStart(2,"0"));

useEffect(()=>{try{localStorage.setItem(SK,JSON.stringify(data))}catch{}},[data]);

const mExps=data.expenses.filter(e=>e.month===am);
const spent=mExps.reduce((s,e)=>s+Number(e.amount),0);
const income=data.monthlyIncome[am]||0;
const savings=income-spent;

const addExp=(title,amount,date)=>{
const month=date.slice(0,7);
setData(p=>({...p,expenses:[...p.expenses,{id:Date.now().toString(),title,amount:parseFloat(amount),date,month}]}));
};

const delExp=id=>setData(p=>({...p,expenses:p.expenses.filter(e=>e.id!==id)}));

const setIncome=v=>setData(p=>({...p,monthlyIncome:{...p.monthlyIncome,[am]:Number(v)}}));

const prevMonth=()=>{const[y,m]=am.split("-").map(Number);const d=new Date(y,m-2);setAm(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`)};
const nextMonth=()=>{const[y,m]=am.split("-").map(Number);const d=new Date(y,m);setAm(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`)};

const mLbl=new Date(am+"-01").toLocaleDateString("en-IN",{month:"long",year:"numeric"});

return React.createElement("div",{style:{minHeight:"100vh",background:"#F0F4FF",paddingBottom:80}},
React.createElement("div",{style:{background:"linear-gradient(135deg,#2563EB,#7C3AED)",padding:"20px",color:"#fff"}},
React.createElement("div",{style:{fontSize:11,fontWeight:600,textTransform:"uppercase",marginBottom:4}},"Budget"),
React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
React.createElement("button",{onClick:prevMonth,style:{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:8,color:"#fff",width:32,height:32,cursor:"pointer"}},"‹"),
React.createElement("div",{style:{fontSize:20,fontWeight:300,color:"#fff"}},mLbl),
React.createElement("button",{onClick:nextMonth,style:{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:8,color:"#fff",width:32,height:32,cursor:"pointer"}},">")
)
),
React.createElement("div",{style:{padding:"20px"}},
view==="dashboard"?React.createElement("div",null,
React.createElement("div",{style:{background:"#fff",borderRadius:16,padding:16,marginBottom:14}},
React.createElement("div",{style:{fontSize:11,color:"#6366F1",fontWeight:600,textTransform:"uppercase",marginBottom:4}},"Income"),
React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
React.createElement("div",{style:{fontSize:22,fontWeight:600,color:"#1A1A2E"}},income>0?fmt(income):"Not set"),
React.createElement("button",{onClick:()=>{const v=prompt("Income:",income||"");if(v)setIncome(v)},style:{background:"#6366F1",border:"none",borderRadius:10,color:"#fff",padding:"8px 14px",fontSize:12,cursor:"pointer"}},"Edit")
)
),
React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}},
React.createElement("div",{style:{background:"linear-gradient(135deg,#EF4444,#F97316)",borderRadius:14,padding:16,color:"#fff"}},
React.createElement("div",{style:{fontSize:10,fontWeight:600,textTransform:"uppercase"}},"Spent"),
React.createElement("div",{style:{fontSize:22,fontWeight:600,marginTop:6}},fmt(spent))
),
React.createElement("div",{style:{background:savings>=0?"linear-gradient(135deg,#10B981,#059669)":"linear-gradient(135deg,#EF4444,#DC2626)",borderRadius:14,padding:16,color:"#fff"}},
React.createElement("div",{style:{fontSize:10,fontWeight:600,textTransform:"uppercase"}},"Savings"),
React.createElement("div",{style:{fontSize:22,fontWeight:600,marginTop:6}},fmt(Math.abs(savings)))
)
)
):
view==="expenses"?React.createElement("div",null,
React.createElement("div",{style:{fontSize:11,fontWeight:600,color:"#94A3B8",textTransform:"uppercase",marginBottom:12}},"Expenses"),
mExps.length===0?React.createElement("div",{style:{textAlign:"center",color:"#94A3B8",padding:"40px 0"}},"No expenses"):
mExps.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(e=>React.createElement("div",{key:e.id,style:{background:"#fff",borderRadius:16,padding:14,marginBottom:10,display:"flex",justifyContent:"space-between"}},
React.createElement("div",null,
React.createElement("div",{style:{fontSize:13,fontWeight:600}},e.title),
React.createElement("div",{style:{fontSize:11,color:"#94A3B8",marginTop:4}},new Date(e.date).toLocaleDateString("en-IN"))
),
React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8}},
React.createElement("div",{style:{fontSize:15,fontWeight:600,color:"#EF4444"}},fmt(e.amount)),
React.createElement("button",{onClick:()=>delExp(e.id),style:{background:"#FEE2E2",border:"none",borderRadius:6,color:"#EF4444",padding:"3px 8px",fontSize:11,cursor:"pointer"}},"Del")
)
))
):null
),
React.createElement("div",{style:{position:"fixed",bottom:0,left:0,right:0,background:"#fff",borderTop:"1px solid #E2E8F0",display:"flex",justifyContent:"center",gap:20,padding:"12px 0"}},
React.createElement("button",{onClick:()=>setView("dashboard"),style:{background:"none",border:"none",cursor:"pointer",fontSize:12,color:view==="dashboard"?"#2563EB":"#94A3B8",fontWeight:500}},"Home"),
React.createElement("button",{onClick:()=>setView("expenses"),style:{background:"none",border:"none",cursor:"pointer",fontSize:12,color:view==="expenses"?"#2563EB":"#94A3B8",fontWeight:500}},"Expenses"),
view==="expenses"?React.createElement("button",{onClick:()=>{const t=prompt("Title:");if(!t)return;const a=prompt("Amount:");if(!a)return;const d=prompt("Date:",new Date().toISOString().split("T")[0]);if(!d)return;addExp(t,a,d)},style:{background:"linear-gradient(135deg,#2563EB,#7C3AED)",border:"none",color:"#fff",borderRadius:10,padding:"8px 16px",cursor:"pointer",fontSize:12,fontWeight:600}},"Add"):null
)
);
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
