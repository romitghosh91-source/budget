<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Budget"/>
<title>Budget</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Sora',system-ui,sans-serif;background:#F0F4FF;color:#1A1A2E;min-height:100vh;overflow-x:hidden}
input,select,textarea{font-family:'Sora',system-ui,sans-serif;-webkit-appearance:none}
input[type=date]{color-scheme:light}
::-webkit-scrollbar{display:none}
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body>
<div id="root"></div>
<script>
const{useState,useEffect}=React;
const SK="romit_budget_v1";
const CATS=["Food & Dining","Travel & Transport","Shopping","Entertainment","Health & Wellness","Home & Utilities","Subscriptions","Investments","Business Expenses","Charitable Donations","Bandit Expenses","Annual Overheads","Miscellaneous"];
const ICONS={"Food & Dining":"🍽","Travel & Transport":"🚗","Shopping":"🛍","Entertainment":"🎬","Health & Wellness":"💊","Home & Utilities":"🏠","Subscriptions":"📱","Investments":"📈","Business Expenses":"💼","Charitable Donations":"🤲","Bandit Expenses":"🐾","Annual Overheads":"📅","Miscellaneous":"📦"};

const fmt=n=>new Intl.NumberFormat("en-IN",{style:"currency",currency:"INR",maximumFractionDigits:0}).format(n);
const mLbl=ym=>{const[y,m]=ym.split("-");return new Date(y,m-1).toLocaleDateString("en-IN",{month:"long",year:"numeric"})};
const nextMStr=ym=>{const[y,m]=ym.split("-").map(Number);const d=new Date(y,m);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`};
const prevMStr=ym=>{const[y,m]=ym.split("-").map(Number);const d=new Date(y,m-2);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`};

function App(){
const[data,setData]=useState(()=>{try{const r=localStorage.getItem(SK);return r?JSON.parse(r):{cards:[],expenses:[],budgets:{},overheads:[],monthlyIncome:{}}}catch{return{cards:[],expenses:[],budgets:{},overheads:[],monthlyIncome:{}}}});
const[view,setView]=useState("dashboard");
const[am,setAm]=useState(new Date().getFullYear()+"-"+String(new Date().getMonth()+1).padStart(2,"0"));
const[showExp,setShowExp]=useState(false);
const[editExp,setEditExp]=useState(null);
const[showCard,setShowCard]=useState(false);
const[showOh,setShowOh]=useState(false);
const[showBudget,setShowBudget]=useState(null);

useEffect(()=>{try{localStorage.setItem(SK,JSON.stringify(data))}catch{}},[data]);

const mExps=data.expenses.filter(e=>e.month===am);
const spent=mExps.reduce((s,e)=>s+Number(e.amount),0);
const income=data.monthlyIncome[am]||0;
const savings=income-spent;

const addExp=e=>{const id=Date.now().toString();const month=e.date.slice(0,7);setData(p=>({...p,expenses:[...p.expenses,{id,...e,month}]}))};
const updateExp=(id,updates)=>setData(p=>({...p,expenses:p.expenses.map(e=>e.id===id?{...e,...updates}:e)}));
const delExp=id=>setData(p=>({...p,expenses:p.expenses.filter(e=>e.id!==id)}));
const setIncome=v=>setData(p=>({...p,monthlyIncome:{...p.monthlyIncome,[am]:Number(v)}}));

return React.createElement("div",{style:{minHeight:"100vh",background:"#F0F4FF",paddingBottom:80}},
React.createElement("div",{style:{background:"linear-gradient(135deg,#2563EB,#7C3AED)",padding:"20px",paddingTop:"max(20px,env(safe-area-inset-top))",color:"#fff"}},
React.createElement("div",{style:{fontSize:11,fontWeight:600,letterSpacing:"0.18em",color:"rgba(255,255,255,0.7)",textTransform:"uppercase",marginBottom:4}},"Budget"),
React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between"}},
React.createElement("button",{onClick:()=>setAm(prevMStr(am)),style:{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:8,color:"#fff",width:32,height:32,cursor:"pointer",fontSize:16}},"‹"),
React.createElement("div",{style:{fontSize:20,fontWeight:300,letterSpacing:"-0.02em",color:"#fff"}},mLbl(am)),
React.createElement("button",{onClick:()=>setAm(nextMStr(am)),style:{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:8,color:"#fff",width:32,height:32,cursor:"pointer",fontSize:16}},">")
)
),
React.createElement("div",{style:{padding:"16px 20px",paddingBottom:80}},
view==="dashboard"?React.createElement("div",null,
React.createElement("div",{style:{background:"linear-gradient(135deg,#EFF6FF,#F5F3FF)",borderRadius:16,padding:16,marginBottom:14}},
React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
React.createElement("div",null,
React.createElement("div",{style:{fontSize:11,color:"#6366F1",letterSpacing:"0.08em",fontWeight:600,textTransform:"uppercase"}},"Monthly Income"),
React.createElement("div",{style:{fontSize:22,fontWeight:600,color:"#1E1B4B",marginTop:2}},income>0?fmt(income):"Not set")
),
React.createElement("button",{onClick:()=>{const v=prompt("Income:",income||"");if(v)setIncome(v)},style:{background:"#6366F1",border:"none",borderRadius:10,color:"#fff",padding:"8px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}},"Edit")
)
),
React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}},
React.createElement("div",{style:{background:"linear-gradient(135deg,#EF4444,#F97316)",borderRadius:14,padding:16,color:"#fff"}},
React.createElement("div",{style:{fontSize:10,fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",opacity:0.9}},"Spent"),
React.createElement("div",{style:{fontSize:22,fontWeight:600,marginTop:6}},fmt(spent))
),
React.createElement("div",{style:{background:savings>=0?"linear-gradient(135deg,#10B981,#059669)":"linear-gradient(135deg,#EF4444,#DC2626)",borderRadius:14,padding:16,color:"#fff"}},
React.createElement("div",{style:{fontSize:10,fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",opacity:0.9}},"Savings"),
React.createElement("div",{style:{fontSize:22,fontWeight:600,marginTop:6}},fmt(Math.abs(savings)))
)
)
):
view==="expenses"?React.createElement("div",null,
React.createElement("div",{style:{fontSize:11,fontWeight:600,color:"#94A3B8",textTransform:"uppercase",marginBottom:12}},"Expenses"),
mExps.length===0?React.createElement("div",{style:{textAlign:"center",color:"#94A3B8",padding:"40px 0"}},"No expenses this month"):
mExps.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(e=>React.createElement("div",{key:e.id,style:{background:"#fff",borderRadius:16,padding:14,marginBottom:10}},
React.createElement("div",{style:{display:"flex",gap:10}},
React.createElement("div",{style:{width:10,height:10,borderRadius:"50%",background:"#2563EB",marginTop:3}}),
React.createElement("div",{style:{flex:1}},
React.createElement("div",{style:{fontSize:13,fontWeight:600}},e.title),
React.createElement("div",{style:{fontSize:11,color:"#94A3B8",marginTop:4}},new Date(e.date).toLocaleDateString("en-IN"))
),
React.createElement("div",{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}},
React.createElement("div",{style:{fontSize:15,fontWeight:600,color:"#EF4444"}},fmt(e.amount)),
React.createElement("div",{style:{display:"flex",gap:4}},
React.createElement("button",{onClick:()=>setEditExp(e),style:{background:"#EFF6FF",border:"none",borderRadius:6,color:"#2563EB",padding:"3px 8px",fontSize:11,cursor:"pointer"}},"Edit"),
React.createElement("button",{onClick:()=>delExp(e.id),style:{background:"#FEE2E2",border:"none",borderRadius:6,color:"#EF4444",padding:"3px 8px",fontSize:11,cursor:"pointer"}},"Delete")
)
)
))
):null
),
view==="expenses"?React.createElement("button",{onClick:()=>setShowExp(true),style:{position:"fixed",bottom:90,right:20,width:52,height:52,borderRadius:16,background:"linear-gradient(135deg,#2563EB,#7C3AED)",border:"none",color:"#fff",fontSize:24,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 20px rgba(37,99,235,0.4)"}},"<+"):null,
React.createElement("div",{style:{position:"fixed",bottom:0,left:0,right:0,background:"#fff",borderTop:"1px solid #E2E8F0",display:"flex",justifyContent:"space-around",padding:"10px 0",paddingBottom:"max(10px,env(safe-area-inset-bottom))",zIndex:50}},
["dashboard","expenses"].map(v=>React.createElement("button",{key:v,onClick:()=>setView(v),style:{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:view===v?"#2563EB":"#94A3B8",fontSize:11,fontWeight:500,padding:"6px 10px"}},v==="dashboard"?"Home":"Expenses"))
),
(showExp||editExp)&&React.createElement(ExpenseModal,{existing:editExp,onClose:()=>{setShowExp(false);setEditExp(null)},onSave:e=>{editExp?updateExp(editExp.id,e):addExp(e);setShowExp(false);setEditExp(null)}})
);
}

function ExpenseModal({existing,onClose,onSave}){
const[title,setTitle]=useState(existing?.title||"");
const[amt,setAmt]=useState(existing?.amount||"");
const[date,setDate]=useState(existing?.date||new Date().toISOString().split("T")[0]);
const save=()=>{if(!title.trim()||!amt)return;onSave({title:title.trim(),amount:parseFloat(amt),category:"Food & Dining",card:"Cash",type:"personal",date})};
return React.createElement("div",{onClick:onClose,style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:200,display:"flex",alignItems:"flex-end"}},
React.createElement("div",{onClick:e=>e.stopPropagation(),style:{background:"#fff",borderRadius:"20px 20px 0 0",padding:24,paddingBottom:"max(24px,env(safe-area-inset-bottom))",width:"100%"}},
React.createElement("div",{style:{fontSize:16,fontWeight:600,marginBottom:16}},(existing?"Edit":"Add")+" expense"),
React.createElement("input",{style:{width:"100%",background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:10,padding:"10px 12px",color:"#1A1A2E",fontSize:14,marginBottom:10,outline:"none",fontFamily:"'Sora',system-ui,sans-serif"},placeholder:"Title",value:title,onChange:e=>setTitle(e.target.value)}),
React.createElement("input",{style:{width:"100%",background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:10,padding:"10px 12px",color:"#1A1A2E",fontSize:14,marginBottom:10,outline:"none",fontFamily:"'Sora',system-ui,sans-serif"},placeholder:"Amount",type:"number",value:amt,onChange:e=>setAmt(e.target.value)}),
React.createElement("input",{style:{width:"100%",background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:10,padding:"10px 12px",color:"#1A1A2E",fontSize:14,marginBottom:10,outline:"none",fontFamily:"'Sora',system-ui,sans-serif"},type:"date",value:date,onChange:e=>setDate(e.target.value)}),
React.createElement("button",{onClick:save,style:{width:"100%",padding:13,borderRadius:12,background:"linear-gradient(135deg,#2563EB,#7C3AED)",border:"none",color:"#fff",fontSize:15,fontWeight:600,cursor:"pointer",marginTop:6}},existing?"Save changes":"Add expense"),
React.createElement("button",{onClick:onClose,style:{width:"100%",padding:11,borderRadius:12,background:"transparent",border:"1px solid #E2E8F0",color:"#64748B",fontSize:14,cursor:"pointer",marginTop:8}},existing?"Close":"Cancel")
)
);
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
