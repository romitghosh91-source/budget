// ===== EXPORT / IMPORT / RECOVERY (added) =====
window.__exportData=function(){
  try{
    var raw=localStorage.getItem("romit_budget_v1")||"{}";
    var blob=new Blob([raw],{type:"application/json"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");
    var d=new Date();
    var stamp=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    a.href=url; a.download="budget-backup-"+stamp+".json";
    document.body.appendChild(a); a.click();
    setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url)},100);
    // iOS Safari sometimes blocks download - also offer copy fallback
    setTimeout(function(){
      if(confirm("Backup file downloaded.\n\nTap OK to ALSO copy the data to clipboard as a safety copy.")){
        var ta=document.createElement("textarea");ta.value=raw;document.body.appendChild(ta);ta.select();
        try{document.execCommand("copy")}catch(e){}
        document.body.removeChild(ta);
        alert("Copied. Paste somewhere safe (Notes, email to yourself).");
      }
    },300);
  }catch(e){alert("Export failed: "+e.message)}
};

window.__importData=function(){
  var inp=document.createElement("input");
  inp.type="file"; inp.accept="application/json,.json";
  inp.onchange=function(e){
    var f=e.target.files[0]; if(!f)return;
    var r=new FileReader();
    r.onload=function(){
      try{
        var d=JSON.parse(r.result);
        if(!d.expenses && !d.monthlyIncome){alert("This doesn't look like a budget backup.");return}
        var cur=localStorage.getItem("romit_budget_v1");
        var curCount=0; try{curCount=(JSON.parse(cur).expenses||[]).length}catch(e){}
        var newCount=(d.expenses||[]).length;
        if(!confirm("Import "+newCount+" expenses?\nThis REPLACES current data ("+curCount+" expenses).\nA snapshot of current data will be kept.")){return}
        // snapshot current before replacing
        try{if(cur){var s=JSON.parse(localStorage.getItem("romit_budget_v1_snaps")||"[]");s.push({t:Date.now(),d:cur});localStorage.setItem("romit_budget_v1_snaps",JSON.stringify(s))}}catch(e){}
        localStorage.setItem("romit_budget_v1",JSON.stringify(d));
        alert("Imported. Reloading.");
        location.reload();
      }catch(err){alert("Import failed: invalid file. "+err.message)}
    };
    r.readAsText(f);
  };
  inp.click();
};
// paste-based import fallback for iOS
window.__importPaste=function(){
  var t=prompt("Paste your backup JSON here:");
  if(!t)return;
  try{
    var d=JSON.parse(t);
    if(!d.expenses&&!d.monthlyIncome){alert("Not a valid backup.");return}

    localStorage.setItem("romit_budget_v1",JSON.stringify(d));
    alert("Imported. Reloading.");location.reload();
  }catch(e){alert("Invalid JSON.")}
};
