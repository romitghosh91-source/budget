<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Data Recovery</title>
<style>
body{font-family:-apple-system,system-ui,sans-serif;background:#0B1020;color:#fff;margin:0;padding:20px;line-height:1.5}
h2{font-size:20px;margin:0 0 16px}
.row{background:#1a2138;border-radius:10px;padding:14px;margin-bottom:12px}
.label{font-size:12px;color:#8fb3ff;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px}
.val{font-size:16px;font-weight:600;font-family:monospace}
.big{font-size:28px;color:#10B981}
.zero{color:#EF4444}
textarea{width:100%;height:220px;background:#000;color:#0f0;border:1px solid #333;border-radius:8px;padding:10px;font-size:11px;font-family:monospace;margin-top:8px;box-sizing:border-box}
button{background:#2563EB;border:none;color:#fff;padding:14px 20px;border-radius:10px;font-size:15px;font-weight:600;margin-top:10px;width:100%}
.hint{font-size:13px;color:#94a3b8;margin-top:10px}
</style>
</head>
<body>
<h2>📦 Budget Data Recovery</h2>
<div id="out">Reading storage…</div>
<script>
(function(){
  var out=document.getElementById("out");
  var html="";
  // 1. List all keys
  var allKeys=[];
  try{for(var i=0;i<localStorage.length;i++){allKeys.push(localStorage.key(i))}}catch(e){}
  var romitKeys=allKeys.filter(function(k){return k&&k.indexOf("romit")>-1});

  // 2. Read v1
  var raw=null;
  try{raw=localStorage.getItem("romit_budget_v1")}catch(e){raw="ERROR: "+e.message}
  var count=0,incMonths=0,cards=0;
  try{var p=JSON.parse(raw);if(p){count=(p.expenses||[]).length;incMonths=p.monthlyIncome?Object.keys(p.monthlyIncome).length:0;cards=(p.cards||[]).length}}catch(e){}

  html+='<div class="row"><div class="label">Keys found containing "romit"</div><div class="val">'+(romitKeys.length?romitKeys.join("<br>"):"NONE")+'</div></div>';
  html+='<div class="row"><div class="label">Expenses in romit_budget_v1</div><div class="big '+(count?"":"zero")+'">'+count+'</div></div>';
  html+='<div class="row"><div class="label">Income months / Cards</div><div class="val">'+incMonths+' months · '+cards+' cards</div></div>';
  html+='<div class="row"><div class="label">Raw stored data</div><textarea readonly>'+(raw?raw.replace(/</g,"&lt;"):"null")+'</textarea></div>';

  // Also scan every romit key's content for expense arrays
  if(romitKeys.length){
    html+='<div class="row"><div class="label">All romit keys — expense counts</div>';
    romitKeys.forEach(function(k){
      var c=0;try{var d=JSON.parse(localStorage.getItem(k));if(d&&d.expenses)c=d.expenses.length}catch(e){}
      html+='<div class="val">'+k+': <b>'+c+'</b> expenses</div>';
    });
    html+='</div>';
  }

  html+='<button onclick="copyRaw()">Copy raw data (backup it now)</button>';
  html+='<div class="hint">If expenses &gt; 0 above, your data is ALIVE. Tap copy and paste it back to me immediately so we save a backup. If it shows 0 / null everywhere, the data is not in this browser store.</div>';

  out.innerHTML=html;

  window.copyRaw=function(){
    var ta=document.querySelector("textarea");
    ta.select();
    try{document.execCommand("copy");alert("Copied. Now paste it to Claude.")}catch(e){alert("Select the green box manually and copy.")}
  };
})();
</script>
</body>
</html>
